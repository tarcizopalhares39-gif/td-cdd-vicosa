<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Triagem CDD Viçosa - TD CDD Viçosa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<style>
  :root {
    --bg-color: #000000;
    --correios-blue: #005CA9;
    --correios-yellow: #FFE600;
    --neon-blue: #00e5ff;
    --neon-yellow: #fffb00;
  }
  
  body {
    background-color: var(--bg-color);
    color: #ffffff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    position: relative;
    box-sizing: border-box;
  }

  /* ==========================================
     CABEÇALHO COM BRANDING
     ========================================== */
  .header-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 50px;
    margin-bottom: 20px;
    gap: 4px;
  }

  h1 {
    color: var(--correios-yellow);
    text-shadow: 0 0 15px var(--neon-yellow), 3px 3px 6px #000;
    margin: 0;
    text-align: center;
    font-size: 2.2rem;
    letter-spacing: 2px;
  }

  .dev-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    font-family: 'Courier New', monospace;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #334;
    user-select: none;
  }

  .dev-badge::before,
  .dev-badge::after {
    content: '';
    display: block;
    width: 28px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--correios-blue));
  }

  .dev-badge::after {
    background: linear-gradient(90deg, var(--correios-blue), transparent);
  }

  .dev-badge span.name {
    color: var(--correios-blue);
    font-weight: bold;
    letter-spacing: 4px;
    text-shadow: 0 0 8px rgba(0, 92, 169, 0.6);
  }

  .dev-badge span.label {
    color: #3a3a4a;
    letter-spacing: 3px;
  }

  /* Botão discreto para alterar a chave da API */
  .key-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    background: #0a0a0a;
    border: 1px solid var(--correios-blue);
    color: var(--neon-blue);
    padding: 8px 12px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    box-shadow: inset 2px 2px 4px #040404, inset -2px -2px 4px #101010;
    transition: all 0.2s ease;
    z-index: 10;
  }

  .key-btn:active {
    background: var(--correios-blue);
    color: #fff;
    box-shadow: 0 0 10px var(--neon-blue);
  }

  .input-container {
    display: flex;
    gap: 15px;
    width: 100%;
    max-width: 700px;
    margin-bottom: 25px;
    align-items: center;
    box-sizing: border-box;
  }

  /* Estilo Neumórfico Dark AMOLED */
  input[type="text"] {
    flex-grow: 1;
    padding: 18px 25px;
    border-radius: 30px;
    border: none;
    background: #0a0a0a;
    color: var(--neon-blue);
    font-size: 18px;
    font-weight: bold;
    box-shadow: inset 6px 6px 12px #040404, inset -6px -6px 12px #101010;
    outline: none;
    transition: all 0.3s ease;
    width: 100%;
    box-sizing: border-box;
  }

  input[type="text"]:focus {
    box-shadow: inset 3px 3px 6px #040404, inset -3px -3px 6px #101010, 0 0 20px rgba(0, 92, 169, 0.6);
  }

  input[type="text"]::placeholder {
    color: #444;
  }

  .mic-btn, .send-btn {
    width: 65px;
    height: 65px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 26px;
    transition: all 0.2s ease;
    outline: none;
    flex-shrink: 0;
  }

  /* Botão Microfone 3D */
  .mic-btn {
    background: linear-gradient(145deg, #0063b5, #005398);
    box-shadow: 6px 6px 12px #002544, -6px -6px 12px #0093ff;
    color: var(--neon-yellow);
  }

  .mic-btn:active, .mic-btn.listening {
    background: var(--correios-blue);
    box-shadow: inset 6px 6px 12px #004a87, inset -6px -6px 12px #006ecb, 0 0 25px var(--neon-blue);
  }

  /* Botão Enviar 3D */
  .send-btn {
    background: linear-gradient(145deg, #ffe600, #d4c000);
    box-shadow: 6px 6px 12px #665c00, -6px -6px 12px #ffff00;
    color: #000;
  }

  .send-btn:active {
    background: var(--correios-yellow);
    box-shadow: inset 6px 6px 12px #cca300, inset -6px -6px 12px #ffff00;
  }

  #status {
    color: var(--neon-blue);
    font-size: 15px;
    margin-bottom: 25px;
    font-weight: 600;
    letter-spacing: 1px;
    text-shadow: 0 0 5px rgba(0, 229, 255, 0.5);
    text-align: center;
    padding: 0 10px;
  }

  #results {
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Cards de Resposta */
  .card {
    background: linear-gradient(145deg, #121212, #0d0d0d);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 8px 8px 16px #050505, -8px -8px 16px #151515;
    border-left: 6px solid var(--correios-yellow);
    animation: fadeIn 0.4s ease-out;
  }

  .card h3 {
    margin: 0 0 15px 0;
    color: var(--correios-yellow);
    font-size: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .card p {
    margin: 8px 0;
    color: #e0e0e0;
    line-height: 1.6;
    font-size: 17px;
  }

  .card p.streaming {
    min-height: 24px;
  }

  /* Cursor piscante durante streaming */
  .cursor-blink {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--neon-blue);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.7s step-end infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .card strong {
    color: var(--neon-blue);
    text-shadow: 0 0 3px rgba(0, 229, 255, 0.3);
  }

  /* Botão limpar histórico */
  .clear-btn {
    background: #0a0a0a;
    border: 1px solid #333;
    color: #666;
    padding: 8px 18px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 13px;
    align-self: flex-end;
    transition: all 0.2s ease;
    display: none;
    margin-top: 10px;
  }

  .clear-btn:hover {
    border-color: var(--correios-yellow);
    color: var(--correios-yellow);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ==========================================
     AJUSTES PARA SMARTPHONES (RESPONSIVIDADE)
     ========================================== */
  @media (max-width: 600px) {
    body {
      padding: 15px 10px;
    }

    .header-block {
      margin-top: 60px;
    }

    h1 {
      font-size: 1.6rem;
    }

    .dev-badge {
      font-size: 9px;
      letter-spacing: 2px;
    }

    .key-btn {
      top: 10px;
      right: 10px;
      font-size: 12px;
      padding: 6px 10px;
    }

    .input-container {
      gap: 8px;
    }

    input[type="text"] {
      padding: 15px 18px;
      font-size: 15px;
    }

    .mic-btn, .send-btn {
      width: 50px;
      height: 50px;
      font-size: 20px;
    }

    .card {
      padding: 18px;
    }

    .card h3 {
      font-size: 17px;
    }

    .card p {
      font-size: 15px;
    }
  }
</style>
</head>
<body>

  <button class="key-btn" id="resetKeyBtn" title="Alterar Chave API">🔑 API</button>
  
  <div class="header-block">
    <h1>CDD Viçosa</h1>
    <div class="dev-badge">
      <span class="name">TARCIZO</span>
      <span class="label">DEVELOPER</span>
    </div>
  </div>

  <div id="status">🟡 Inicializando sistema e carregando rotas...</div>

  <div class="input-container">
    <input type="text" id="textInput" placeholder="Fale ou digite a rua...">
    <button class="mic-btn" id="micBtn" title="Falar">🎤</button>
    <button class="send-btn" id="sendBtn" title="Pesquisar">➤</button>
  </div>

  <div id="results"></div>
  <button class="clear-btn" id="clearBtn">🗑️ Limpar histórico</button>

<script>
  // ==========================================
  // CONFIGURAÇÕES E VARIÁVEIS GERAIS
  // ==========================================

  const PDF_FILENAME  = 'Tabela de ruas e distritos 22-09.pdf';
  // MELHORIA 4: Modelo mais rápido (Flash 2.0 = latência menor para buscas simples)
  const GEMINI_MODEL  = 'gemini-2.0-flash';
  let   API_KEY       = localStorage.getItem('gemini_api_key');

  const systemPrompt = `Conforme a tabela de ruas e distritos vamos fazer uma triagem:
Quando eu disser o nome de uma rua (e opcionalmente um número), você deve me dizer a qual distrito ela pertence, conforme as seguintes regras:
Distrito Único: Se a rua estiver em apenas um distrito, diga qual é.
Múltiplos Distritos: Se a rua passar por mais de um distrito, liste e informe isso e especifique as faixas de números para cada distrito.
Nomes Similares ou Abreviados: Considere variações no nome (abreviações, ordem dos sobrenomes, grafias parecidas, abreviações de rua, avenida, etc). e me diga o distrito mesmo assim.
Nomes parecidos e sobrenome parecidos, então me liste os distritos o que achou.
Mesmo quando eu disser o sobrenome, ou somente o primeiro nome da rua de forma abreviada, então liste os nomes e os Distritos que você achou na tabela.
Por favor responda em Português (Brasil) e de forma rápida e direta. Não use markdown complexo, apenas **negrito** para destacar informações.`;

  // MELHORIA 1: Cache do contexto completo, montado uma única vez após o PDF carregar.
  // Assim cada consulta não precisa reconstruir o prompt base.
  let cachedContext = "";

  const statusDiv   = document.getElementById('status');
  const micBtn      = document.getElementById('micBtn');
  const sendBtn     = document.getElementById('sendBtn');
  const textInput   = document.getElementById('textInput');
  const resultsDiv  = document.getElementById('results');
  const resetKeyBtn = document.getElementById('resetKeyBtn');
  const clearBtn    = document.getElementById('clearBtn');

  // ==========================================
  // GERENCIAMENTO DA CHAVE DE API
  // ==========================================
  function checkApiKey() {
    if (!API_KEY) {
      const inputKey = prompt("🔐 SRO 4.0 Ultra: Por favor, cole a sua chave da API do Gemini para ativar o sistema:");
      if (inputKey && inputKey.trim() !== "") {
        API_KEY = inputKey.trim();
        localStorage.setItem('gemini_api_key', API_KEY);
      } else {
        alert("A chave da API é necessária para que o sistema funcione. Recarregue a página e insira a chave.");
      }
    }
  }

  resetKeyBtn.addEventListener('click', () => {
    localStorage.removeItem('gemini_api_key');
    API_KEY = null;
    checkApiKey();
  });

  // ==========================================
  // LIMPAR HISTÓRICO
  // ==========================================
  clearBtn.addEventListener('click', () => {
    resultsDiv.innerHTML = '';
    clearBtn.style.display = 'none';
  });

  // ==========================================
  // RECONHECIMENTO DE VOZ
  // ==========================================
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  
  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'pt-BR';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
      micBtn.classList.add('listening');
      statusDiv.innerText = "🔵 Ouvindo... Fale o nome da rua.";
    };

    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      textInput.value = transcript;
      statusDiv.innerText = "🟡 Processando áudio...";
      processQuery(transcript);
    };

    recognition.onerror = (event) => {
      statusDiv.innerText = "🔴 Erro no microfone: " + event.error;
      micBtn.classList.remove('listening');
    };

    recognition.onend = () => {
      micBtn.classList.remove('listening');
    };
  } else {
    micBtn.style.display = 'none';
    statusDiv.innerText = "🔴 Navegador incompatível com comando de voz.";
  }

  micBtn.addEventListener('click', () => { if (recognition) recognition.start(); });
  sendBtn.addEventListener('click', () => { if (textInput.value.trim()) processQuery(textInput.value); });
  textInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && textInput.value.trim()) processQuery(textInput.value);
  });

  // ==========================================
  // CARREGAMENTO DO PDF
  // ==========================================
  async function loadPDF() {
    try {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

      const loadingTask = pdfjsLib.getDocument(PDF_FILENAME);
      const pdf = await loadingTask.promise;
      let fullText = "";

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        const pageText = textContent.items.map(item => item.str).join(' ');
        fullText += pageText + "\n";
      }

      // MELHORIA 1: Monta o contexto completo uma única vez e armazena em cache.
      // Cada busca só vai acrescentar a pergunta do usuário no final.
      cachedContext = `${systemPrompt}\n\nAqui está o conteúdo extraído do PDF da tabela de ruas:\n${fullText}\n\nPergunta do usuário: `;

      statusDiv.innerText = "🟢 Sistema pronto! Base de rotas carregada.";
      statusDiv.style.color = "var(--neon-blue)";
      
      checkApiKey();
      
    } catch (error) {
      statusDiv.innerText = "🔴 Erro ao carregar o PDF. Verifique se o arquivo está na mesma pasta do HTML.";
      statusDiv.style.color = "red";
      console.error("Erro PDF:", error);
    }
  }

  // ==========================================
  // INTEGRAÇÃO COM A API DO GEMINI (STREAMING)
  // MELHORIA 2: Usa streamGenerateContent para exibir texto progressivamente.
  // O usuário vê a primeira palavra em ~1s, sem esperar a resposta completa.
  // ==========================================
  async function processQuery(query) {
    if (!API_KEY) {
      checkApiKey();
      if (!API_KEY) return;
    }

    if (!cachedContext) {
      alert("Aguarde o carregamento do PDF ou verifique os erros na tela!");
      return;
    }

    sendBtn.disabled = true;
    micBtn.disabled  = true;
    statusDiv.innerText = "🟡 Buscando distrito...";

    // Cria o card imediatamente com cursor piscando (feedback visual instantâneo)
    const newCard = document.createElement('div');
    newCard.className = 'card';
    newCard.innerHTML = `<h3>🔍 Busca: ${query}</h3><p class="streaming" id="streamTarget"><span class="cursor-blink"></span></p>`;
    resultsDiv.insertBefore(newCard, resultsDiv.firstChild);
    clearBtn.style.display = 'block';

    const streamTarget = newCard.querySelector('#streamTarget');
    let accumulatedText = "";

    // MELHORIA 4: Usa o endpoint de streaming do Gemini 2.0 Flash
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:streamGenerateContent?alt=sse&key=${API_KEY}`;

    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: cachedContext + query }] }],
          generationConfig: { temperature: 0.1 }
        })
      });

      if (!response.ok) {
        const errData = await response.json();
        throw new Error(errData.error?.message || `HTTP ${response.status}`);
      }

      const reader  = response.body.getReader();
      const decoder = new TextDecoder('utf-8');
      let   buffer  = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // guarda linha incompleta para próxima iteração

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const jsonStr = line.slice(6).trim();
          if (!jsonStr || jsonStr === '[DONE]') continue;

          try {
            const chunk = JSON.parse(jsonStr);
            const piece = chunk?.candidates?.[0]?.content?.parts?.[0]?.text ?? '';
            if (piece) {
              accumulatedText += piece;
              // Renderiza com formatação em tempo real
              let formatted = accumulatedText
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
              streamTarget.innerHTML = formatted + '<span class="cursor-blink"></span>';
            }
          } catch (_) {
            // chunk JSON incompleto, aguarda próximo fragmento
          }
        }
      }

      // Finaliza: remove cursor e congela o texto
      let finalFormatted = accumulatedText
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
      streamTarget.innerHTML = finalFormatted;

      statusDiv.innerText = "🟢 Triagem concluída.";
      textInput.value = '';
      textInput.focus();

    } catch (error) {
      streamTarget.innerHTML = `<span style="color:#ff4d4d">❌ Erro: ${error.message}</span>`;
      statusDiv.innerText = "🔴 Erro na comunicação com a API.";

      if (error.message.includes("API key not valid") || error.message.includes("API_KEY_INVALID")) {
        localStorage.removeItem('gemini_api_key');
        API_KEY = null;
        setTimeout(() => alert("Chave inválida. Clique em '🔑 API' para inserir uma nova."), 500);
      }
    } finally {
      sendBtn.disabled = false;
      micBtn.disabled  = false;
    }
  }

  window.onload = loadPDF;
</script>
</body>
</html>
