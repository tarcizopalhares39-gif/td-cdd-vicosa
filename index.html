<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Triagem CDD Viçosa - TD CDD Viçosa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<style>
  :root {
    --bg-color: #000000;
    --correios-blue: #005CA9;
    --correios-yellow: #FFE600;
    --neon-blue: #00e5ff;
    --neon-yellow: #fffb00;
  }
  
  body {
    background-color: var(--bg-color);
    color: #ffffff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    position: relative;
    box-sizing: border-box;
  }

  h1 {
    color: var(--correios-yellow);
    text-shadow: 0 0 15px var(--neon-yellow), 3px 3px 6px #000;
    margin-bottom: 25px;
    text-align: center;
    font-size: 2.2rem;
    margin-top: 50px; /* Ajustado para não colidir com o botão da chave */
  }

  /* Botão discreto para alterar a chave da API */
  .key-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    background: #0a0a0a;
    border: 1px solid var(--correios-blue);
    color: var(--neon-blue);
    padding: 8px 12px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    box-shadow: inset 2px 2px 4px #040404, inset -2px -2px 4px #101010;
    transition: all 0.2s ease;
    z-index: 10;
  }

  .key-btn:active {
    background: var(--correios-blue);
    color: #fff;
    box-shadow: 0 0 10px var(--neon-blue);
  }

  .input-container {
    display: flex;
    gap: 15px;
    width: 100%;
    max-width: 700px;
    margin-bottom: 25px;
    align-items: center;
    box-sizing: border-box;
  }

  /* Estilo Neumórfico Dark AMOLED */
  input[type="text"] {
    flex-grow: 1;
    padding: 18px 25px;
    border-radius: 30px;
    border: none;
    background: #0a0a0a;
    color: var(--neon-blue);
    font-size: 18px;
    font-weight: bold;
    box-shadow: inset 6px 6px 12px #040404, inset -6px -6px 12px #101010;
    outline: none;
    transition: all 0.3s ease;
    width: 100%;
    box-sizing: border-box;
  }

  input[type="text"]:focus {
    box-shadow: inset 3px 3px 6px #040404, inset -3px -3px 6px #101010, 0 0 20px rgba(0, 92, 169, 0.6);
  }

  input[type="text"]::placeholder {
    color: #444;
  }

  .mic-btn, .send-btn {
    width: 65px;
    height: 65px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 26px;
    transition: all 0.2s ease;
    outline: none;
    flex-shrink: 0;
  }

  /* Botão Microfone 3D */
  .mic-btn {
    background: linear-gradient(145deg, #0063b5, #005398);
    box-shadow: 6px 6px 12px #002544, -6px -6px 12px #0093ff;
    color: var(--neon-yellow);
  }

  .mic-btn:active, .mic-btn.listening {
    background: var(--correios-blue);
    box-shadow: inset 6px 6px 12px #004a87, inset -6px -6px 12px #006ecb, 0 0 25px var(--neon-blue);
  }

  /* Botão Enviar 3D */
  .send-btn {
    background: linear-gradient(145deg, #ffe600, #d4c000);
    box-shadow: 6px 6px 12px #665c00, -6px -6px 12px #ffff00;
    color: #000;
  }

  .send-btn:active {
    background: var(--correios-yellow);
    box-shadow: inset 6px 6px 12px #cca300, inset -6px -6px 12px #ffff00;
  }

  #status {
    color: var(--neon-blue);
    font-size: 15px;
    margin-bottom: 25px;
    font-weight: 600;
    letter-spacing: 1px;
    text-shadow: 0 0 5px rgba(0, 229, 255, 0.5);
    text-align: center;
    padding: 0 10px;
  }

  #results {
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Cards de Resposta */
  .card {
    background: linear-gradient(145deg, #121212, #0d0d0d);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 8px 8px 16px #050505, -8px -8px 16px #151515;
    border-left: 6px solid var(--correios-yellow);
    animation: fadeIn 0.4s ease-out;
  }

  .card h3 {
    margin: 0 0 15px 0;
    color: var(--correios-yellow);
    font-size: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .card p {
    margin: 8px 0;
    color: #e0e0e0;
    line-height: 1.6;
    font-size: 17px;
  }

  .card strong {
    color: var(--neon-blue);
    text-shadow: 0 0 3px rgba(0, 229, 255, 0.3);
  }

  /* Botão limpar histórico */
  .clear-btn {
    background: #0a0a0a;
    border: 1px solid #333;
    color: #666;
    padding: 8px 18px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 13px;
    align-self: flex-end;
    transition: all 0.2s ease;
    display: none;
    margin-top: 10px;
  }

  .clear-btn:hover {
    border-color: var(--correios-yellow);
    color: var(--correios-yellow);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ==========================================
     AJUSTES PARA SMARTPHONES (RESPONSIVIDADE)
     ========================================== */
  @media (max-width: 600px) {
    body {
      padding: 15px 10px;
    }

    h1 {
      font-size: 1.6rem;
      margin-top: 60px; /* Garante que o botão de chave não cubra o título */
    }

    .key-btn {
      top: 10px;
      right: 10px;
      font-size: 12px;
      padding: 6px 10px;
    }

    .input-container {
      gap: 8px; /* Reduz o espaço entre os botões */
    }

    input[type="text"] {
      padding: 15px 18px;
      font-size: 15px; /* Fonte levemente menor para não cortar palavras grandes */
    }

    /* Reduz os botões redondos para encaixar bem no celular */
    .mic-btn, .send-btn {
      width: 50px;
      height: 50px;
      font-size: 20px;
    }

    .card {
      padding: 18px;
    }

    .card h3 {
      font-size: 17px;
    }

    .card p {
      font-size: 15px;
    }
  }
</style>
</head>
<body>

  <button class="key-btn" id="resetKeyBtn" title="Alterar Chave API">🔑 API</button>
  
  <h1>SRO 4.0 Ultra</h1>
  <div id="status">🟡 Inicializando sistema e carregando rotas...</div>

  <div class="input-container">
    <input type="text" id="textInput" placeholder="Fale ou digite a rua...">
    <button class="mic-btn" id="micBtn" title="Falar">🎤</button>
    <button class="send-btn" id="sendBtn" title="Pesquisar">➤</button>
  </div>

  <div id="results"></div>
  <button class="clear-btn" id="clearBtn">🗑️ Limpar histórico</button>

<script>
  // ==========================================
  // CONFIGURAÇÕES E VARIÁVEIS GERAIS
  // ==========================================

  const PDF_FILENAME = 'Tabela de ruas e distritos 22-09.pdf';
  const GEMINI_MODEL = 'gemini-2.0-flash';
  let API_KEY = localStorage.getItem('gemini_api_key');

  const systemPrompt = `Conforme a tabela de ruas e distritos vamos fazer uma triagem:
Quando eu disser o nome de uma rua (e opcionalmente um número), você deve me dizer a qual distrito ela pertence, conforme as seguintes regras:
Distrito Único: Se a rua estiver em apenas um distrito, diga qual é.
Múltiplos Distritos: Se a rua passar por mais de um distrito, liste e informe isso e especifique as faixas de números para cada distrito.
Nomes Similares ou Abreviados: Considere variações no nome (abreviações, ordem dos sobrenomes, grafias parecidas, abreviações de rua, avenida, etc). e me diga o distrito mesmo assim.
Nomes parecidos e sobrenome parecidos, então me liste os distritos o que achou.
Mesmo quando eu disser o sobrenome, ou somente o primeiro nome da rua de forma abreviada, então liste os nomes e os Distritos que você achou na tabela.
Por favor responda em Português (Brasil) e de forma rápida e direta. Não use markdown complexo, apenas **negrito** para destacar informações.`;

  let pdfTextCache = "";
  const statusDiv    = document.getElementById('status');
  const micBtn       = document.getElementById('micBtn');
  const sendBtn      = document.getElementById('sendBtn');
  const textInput    = document.getElementById('textInput');
  const resultsDiv   = document.getElementById('results');
  const resetKeyBtn  = document.getElementById('resetKeyBtn');
  const clearBtn     = document.getElementById('clearBtn');

  // ==========================================
  // GERENCIAMENTO DA CHAVE DE API
  // ==========================================
  function checkApiKey() {
    if (!API_KEY) {
      const inputKey = prompt("🔐 SRO 4.0 Ultra: Por favor, cole a sua chave da API do Gemini para ativar o sistema:");
      if (inputKey && inputKey.trim() !== "") {
        API_KEY = inputKey.trim();
        localStorage.setItem('gemini_api_key', API_KEY);
      } else {
        alert("A chave da API é necessária para que o sistema funcione. Recarregue a página e insira a chave.");
      }
    }
  }

  resetKeyBtn.addEventListener('click', () => {
    localStorage.removeItem('gemini_api_key');
    API_KEY = null;
    checkApiKey();
  });

  // ==========================================
  // LIMPAR HISTÓRICO
  // ==========================================
  clearBtn.addEventListener('click', () => {
    resultsDiv.innerHTML = '';
    clearBtn.style.display = 'none';
  });

  // ==========================================
  // RECONHECIMENTO DE VOZ
  // ==========================================
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  
  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'pt-BR';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
      micBtn.classList.add('listening');
      statusDiv.innerText = "🔵 Ouvindo... Fale o nome da rua.";
    };

    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      textInput.value = transcript;
      statusDiv.innerText = "🟡 Processando áudio...";
      processQuery(transcript);
    };

    recognition.onerror = (event) => {
      statusDiv.innerText = "🔴 Erro no microfone: " + event.error;
      micBtn.classList.remove('listening');
    };

    recognition.onend = () => {
      micBtn.classList.remove('listening');
    };
  } else {
    micBtn.style.display = 'none';
    statusDiv.innerText = "🔴 Navegador incompatível com comando de voz.";
  }

  micBtn.addEventListener('click', () => { if (recognition) recognition.start(); });
  sendBtn.addEventListener('click', () => { if (textInput.value.trim()) processQuery(textInput.value); });
  textInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && textInput.value.trim()) processQuery(textInput.value);
  });

  // ==========================================
  // CARREGAMENTO DO PDF
  // ==========================================
  async function loadPDF() {
    try {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

      const loadingTask = pdfjsLib.getDocument(PDF_FILENAME);
      const pdf = await loadingTask.promise;
      let fullText = "";

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        const pageText = textContent.items.map(item => item.str).join(' ');
        fullText += pageText + "\n";
      }
      
      pdfTextCache = fullText;
      statusDiv.innerText = "🟢 Sistema pronto! Base de rotas carregada.";
      statusDiv.style.color = "var(--neon-blue)";
      
      checkApiKey();
      
    } catch (error) {
      statusDiv.innerText = "🔴 Erro ao carregar o PDF. Verifique se o arquivo está na mesma pasta do HTML.";
      statusDiv.style.color = "red";
      console.error("Erro PDF:", error);
    }
  }

  // ==========================================
  // INTEGRAÇÃO COM A API DO GEMINI
  // ==========================================
  async function processQuery(query) {
    if (!API_KEY) {
      checkApiKey();
      if (!API_KEY) return;
    }

    if (!pdfTextCache) {
      alert("Aguarde o carregamento do PDF ou verifique os erros na tela!");
      return;
    }

    sendBtn.disabled = true;
    micBtn.disabled  = true;
    
    statusDiv.innerText = "🟡 Mapeando distritos na API...";
    resultsDiv.innerHTML = '<div class="card"><p style="color:var(--neon-yellow);">⏳ Analisando dados...</p></div>'
                         + resultsDiv.innerHTML;

    const promptCompleto = `${systemPrompt}\n\nAqui está o conteúdo extraído do PDF da tabela de ruas:\n${pdfTextCache}\n\nPergunta do usuário: ${query}`;

    try {
      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${API_KEY}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: promptCompleto }] }],
            generationConfig: { temperature: 0.1 }
          })
        }
      );

      const data = await response.json();
      
      if (data.error) throw new Error(data.error.message);
      
      if (data.candidates && data.candidates[0]) {
        const aiResponse = data.candidates[0].content.parts[0].text;
        displayResult(query, aiResponse);
      } else {
        throw new Error("Resposta vazia da API.");
      }

    } catch (error) {
      resultsDiv.innerHTML = resultsDiv.innerHTML.replace(
        /<div class="card"><p style="color:var\(--neon-yellow\);">⏳ Analisando dados\.\.\.<\/p><\/div>/,
        ''
      );
      resultsDiv.innerHTML = `<div class="card"><p style="color:#ff4d4d">❌ Erro: ${error.message}</p></div>`
                           + resultsDiv.innerHTML;
      statusDiv.innerText = "🔴 Erro na comunicação com a API.";
      
      if (error.message.includes("API key not valid") || error.message.includes("API_KEY_INVALID")) {
        localStorage.removeItem('gemini_api_key');
        API_KEY = null;
        setTimeout(() => alert("Chave inválida. Clique em '🔑 API' para inserir uma nova."), 500);
      }
    } finally {
      sendBtn.disabled = false;
      micBtn.disabled  = false;
    }
  }

  // ==========================================
  // RENDERIZAÇÃO DO RESULTADO
  // ==========================================
  function displayResult(query, text) {
    const cards = resultsDiv.querySelectorAll('.card');
    if (cards.length && cards[0].querySelector('p[style*="neon-yellow"]')) {
      cards[0].remove();
    }

    let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    formattedText = formattedText.replace(/\n/g, '<br>');

    const newCard = document.createElement('div');
    newCard.className = 'card';
    newCard.innerHTML = `<h3>🔍 Busca: ${query}</h3><p>${formattedText}</p>`;

    resultsDiv.insertBefore(newCard, resultsDiv.firstChild);

    clearBtn.style.display = 'block';
    statusDiv.innerText = "🟢 Triagem concluída.";
    textInput.value = '';
    textInput.focus();
  }

  window.onload = loadPDF;
</script>
</body>
</html>
