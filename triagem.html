<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triagem CDD Viçosa - Triagem</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<style>
  :root {
    --bg-color: #000000;
    --correios-blue: #005CA9;
    --correios-yellow: #FFE600;
    --neon-blue: #00e5ff;
    --neon-yellow: #fffb00;
  }
  
  body {
    background-color: var(--bg-color);
    color: #ffffff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    color: var(--correios-yellow);
    text-shadow: 0 0 15px var(--neon-yellow), 3px 3px 6px #000;
    margin-bottom: 30px;
    text-align: center;
    font-size: 2.2rem;
  }

  .input-container {
    display: flex;
    gap: 15px;
    width: 100%;
    max-width: 700px;
    margin-bottom: 25px;
    align-items: center;
  }

  /* Estilo Neumórfico Dark AMOLED */
  input[type="text"] {
    flex-grow: 1;
    padding: 18px 25px;
    border-radius: 30px;
    border: none;
    background: #0a0a0a;
    color: var(--neon-blue);
    font-size: 18px;
    font-weight: bold;
    box-shadow: inset 6px 6px 12px #040404, inset -6px -6px 12px #101010;
    outline: none;
    transition: all 0.3s ease;
  }

  input[type="text"]:focus {
    box-shadow: inset 3px 3px 6px #040404, inset -3px -3px 6px #101010, 0 0 20px rgba(0, 92, 169, 0.6);
  }

  input[type="text"]::placeholder {
    color: #444;
  }

  .mic-btn, .send-btn {
    width: 65px;
    height: 65px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 26px;
    transition: all 0.2s ease;
    outline: none;
  }

  /* Botão Microfone 3D */
  .mic-btn {
    background: linear-gradient(145deg, #0063b5, #005398);
    box-shadow: 6px 6px 12px #002544, -6px -6px 12px #0093ff;
    color: var(--neon-yellow);
  }

  .mic-btn:active, .mic-btn.listening {
    background: var(--correios-blue);
    box-shadow: inset 6px 6px 12px #004a87, inset -6px -6px 12px #006ecb, 0 0 25px var(--neon-blue);
  }

  /* Botão Enviar 3D */
  .send-btn {
    background: linear-gradient(145deg, #ffe600, #d4c000);
    box-shadow: 6px 6px 12px #665c00, -6px -6px 12px #ffff00;
    color: #000;
  }

  .send-btn:active {
    background: var(--correios-yellow);
    box-shadow: inset 6px 6px 12px #cca300, inset -6px -6px 12px #ffff00;
  }

  #status {
    color: var(--neon-blue);
    font-size: 15px;
    margin-bottom: 25px;
    font-weight: 600;
    letter-spacing: 1px;
    text-shadow: 0 0 5px rgba(0, 229, 255, 0.5);
  }

  #results {
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Cards de Resposta */
  .card {
    background: linear-gradient(145deg, #121212, #0d0d0d);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 8px 8px 16px #050505, -8px -8px 16px #151515;
    border-left: 6px solid var(--correios-yellow);
    animation: fadeIn 0.4s ease-out;
  }

  .card h3 {
    margin: 0 0 15px 0;
    color: var(--correios-yellow);
    font-size: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .card p {
    margin: 8px 0;
    color: #e0e0e0;
    line-height: 1.6;
    font-size: 17px;
  }

  .card strong {
    color: var(--neon-blue);
    text-shadow: 0 0 3px rgba(0, 229, 255, 0.3);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

  <h1>SRO 4.0 Ultra</h1>
  <div id="status">🟡 Inicializando sistema e carregando rotas...</div>

  <div class="input-container">
    <input type="text" id="textInput" placeholder="Fale ou digite o nome da rua...">
    <button class="mic-btn" id="micBtn" title="Falar">🎤</button>
    <button class="send-btn" id="sendBtn" title="Pesquisar">➤</button>
  </div>

  <div id="results"></div>

<script>
  // ==========================================
  // CONFIGURAÇÕES E VARIÁVEIS GERAIS
  // ==========================================
  const API_KEY = 'AQ.Ab8RN6L8Qx8UOqCBQDmDpBKuJhKLKJtbu0RrberTbgOysLL8bA'; // Insira sua chave Gemini
  const PDF_FILENAME = './Tabela de ruas e distritos 22-09.pdf';

  const systemPrompt = `Conforme a tabela de ruas e distritos vamos fazer uma triagem:
Quando eu disser o nome de uma rua (e opcionalmente um número), você deve me dizer a qual distrito ela pertence, conforme as seguintes regras:
Distrito Único: Se a rua estiver em apenas um distrito, diga qual é.
Múltiplos Distritos: Se a rua passar por mais de um distrito, liste e informe isso e especifique as faixas de números para cada distrito.
Nomes Similares ou Abreviados: Considere variações no nome (abreviações, ordem dos sobrenomes, grafias parecidas, abreviações de rua , avenida, etc). e me diga o distrito mesmo assim.
Nomes parecidos e sobrenome parecidos, então me liste os distritos o que achou.
Mesmo quando eu disser o sobrenome, ou somente o primeiro nome da rua de forma abreviada, então liste os nomes e os Distritos que você achou na tabela.
Por favor responda em Português (Brasil) e de forma rápida e direta. Não use markdown complexo, apenas **negrito** para destacar informações.`;

  let pdfTextCache = "";
  const statusDiv = document.getElementById('status');
  const micBtn = document.getElementById('micBtn');
  const sendBtn = document.getElementById('sendBtn');
  const textInput = document.getElementById('textInput');
  const resultsDiv = document.getElementById('results');

  // ==========================================
  // LÓGICA DE RECONHECIMENTO DE VOZ (MICROFONE)
  // ==========================================
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  
  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'pt-BR';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = function() {
      micBtn.classList.add('listening');
      statusDiv.innerText = "🔵 Ouvindo... Fale o nome da rua.";
    };

    recognition.onresult = function(event) {
      const transcript = event.results[0][0].transcript;
      textInput.value = transcript;
      statusDiv.innerText = "🟡 Processando áudio...";
      processQuery(transcript);
    };

    recognition.onerror = function(event) {
      statusDiv.innerText = "🔴 Erro no microfone: " + event.error;
      micBtn.classList.remove('listening');
    };

    recognition.onend = function() {
      micBtn.classList.remove('listening');
    };
  } else {
    micBtn.style.display = 'none';
    statusDiv.innerText = "🔴 Navegador incompatível com comando de voz.";
  }

  // Eventos de clique e teclado
  micBtn.addEventListener('click', () => { if (recognition) recognition.start(); });
  sendBtn.addEventListener('click', () => { if (textInput.value.trim() !== "") processQuery(textInput.value); });
  textInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && textInput.value.trim() !== "") processQuery(textInput.value);
  });

  // ==========================================
  // CARREGAMENTO DO PDF PARA A MEMÓRIA CACHE
  // ==========================================
  async function loadPDF() {
    try {
      const loadingTask = pdfjsLib.getDocument(PDF_FILENAME);
      const pdf = await loadingTask.promise;
      let fullText = "";

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        const pageText = textContent.items.map(item => item.str).join(' ');
        fullText += pageText + "\\n";
      }
      
      pdfTextCache = fullText;
      statusDiv.innerText = "🟢 Sistema Triagem CDD! Base salva no cache.";
      statusDiv.style.color = "var(--neon-blue)";
    } catch (error) {
      statusDiv.innerText = "🔴 Erro ao carregar PDF. Rodando em servidor local (GitHub Pages/Live Server)?";
      statusDiv.style.color = "red";
      console.error(error);
    }
  }

  // ==========================================
  // INTEGRAÇÃO COM A API DO GEMINI
  // ==========================================
  async function processQuery(query) {
    if (!pdfTextCache) {
      alert("Aguarde o carregamento do PDF ou verifique os erros!");
      return;
    }
    
    statusDiv.innerText = "🟡 Mapeando distritos na API...";
    resultsDiv.innerHTML = '<div class="card"><p style="color:var(--neon-yellow);">⏳ Analisando dados...</p></div>';

    // Montagem do prompt dinâmico enviando as regras, a base em texto e a pergunta
    const promptCompleto = `${systemPrompt}\n\nAqui está o conteúdo extraído do PDF da tabela de ruas:\n${pdfTextCache}\n\nPergunta do usuário: ${query}`;

    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: promptCompleto }] }],
          generationConfig: { temperature: 0.1 } // Temperatura bem baixa para focar em dados reais da tabela
        })
      });

      const data = await response.json();
      if (data.candidates && data.candidates[0]) {
        const aiResponse = data.candidates[0].content.parts[0].text;
        displayResult(query, aiResponse);
      } else {
        throw new Error("Falha ao obter resposta da API.");
      }
    } catch (error) {
      resultsDiv.innerHTML = `<div class="card"><p style="color:red">Erro de conexão: ${error.message}</p></div>`;
      statusDiv.innerText = "🟢 Aguardando nova consulta.";
    }
  }

  // ==========================================
  // RENDERIZAÇÃO DO RESULTADO (CARDS)
  // ==========================================
  function displayResult(query, text) {
    // Converte os negritos do Gemini (**) para a tag <strong> do HTML
    let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    formattedText = formattedText.replace(/\n/g, '<br>');

    resultsDiv.innerHTML = `
      <div class="card">
        <h3>🔍 Busca: ${query}</h3>
        <p>${formattedText}</p>
      </div>
    ` + resultsDiv.innerHTML; // Adiciona no topo para criar um histórico
    
    statusDiv.innerText = "🟢 Triagem concluída.";
    textInput.value = ''; // Limpa a caixa de texto
  }

  // Gatilho inicial
  window.onload = loadPDF;
</script>
</body>
</html>
